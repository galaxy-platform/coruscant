services:
  postgres:
    image: postgres:16
    container_name: coruscant-postgres
    environment:
      POSTGRES_DB: coruscant
      POSTGRES_USER: coruscant
      POSTGRES_PASSWORD: coruscant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
